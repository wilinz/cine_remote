name: cine_remote
description: Camera Remote Control App

# Prevents the package from being published to pub.dev
publish_to: "none"

# Version number followed by build number separated by a +.
version: 0.3.3+7

environment:
  sdk: "^3.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera_control_dart:
    git:
      url: https://github.com/JulianSchroden/camera_control_dart.git
      ref: v0.0.2

  cupertino_icons: ^1.0.2
  hive: ^2.2.3
  flutter_bloc: ^8.1.2
  freezed_annotation: ^2.2.0
  get_it: ^8.0.3
  json_annotation: ^4.8.1
  equatable: ^2.0.5
  carousel_slider: ^5.0.0
  network_info_plus: ^6.1.2
  logging: ^1.1.1
  logger: ^2.5.0
  rxdart: ^0.27.7
  path_provider: ^2.0.15
#  firebase_core: ^3.9.0
#  firebase_crashlytics: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^9.1.0
  build_runner: ^2.4.14
  freezed: ^3.0.0-0.0.dev
  json_serializable: ^6.6.2
  mocktail: ^1.0.4
  meta: ^1.9.1


flutter:
  uses-material-design: true

  assets:
    - assets/images/dummy_live_view_image.jpg
    - assets/images/canon_70d.png
    - assets/images/canon_c100_ii.png
